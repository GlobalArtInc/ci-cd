on:
  workflow_call:
    inputs:
      org:
        required: true
        type: string
        description: "GitHub organization name"
      keys:
        required: true
        type: string
        description: "Comma-separated secret names to sync"
    secrets:
      GH_TOKEN:
        required: true
      HARBOR_HOST:
        required: false
      HARBOR_USERNAME:
        required: false
      HARBOR_PASSWORD:
        required: false
      KUBECTX_PROD1:
        required: false
      KUBECTX_STAGE1:
        required: false
      WERF_SECRET_KEY:
        required: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Sync secrets to ${{ inputs.org }} repos
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          HARBOR_HOST: ${{ secrets.HARBOR_HOST }}
          HARBOR_USERNAME: ${{ secrets.HARBOR_USERNAME }}
          HARBOR_PASSWORD: ${{ secrets.HARBOR_PASSWORD }}
          KUBECTX_PROD1: ${{ secrets.KUBECTX_PROD1 }}
          KUBECTX_STAGE1: ${{ secrets.KUBECTX_STAGE1 }}
          WERF_SECRET_KEY: ${{ secrets.WERF_SECRET_KEY }}
          KEYS_STR: ${{ inputs.keys }}
        run: |
          REPOS=$(gh repo list "${{ inputs.org }}" --limit 1000 --json nameWithOwner -q '.[].nameWithOwner')
          export GH_TOKEN HARBOR_HOST HARBOR_USERNAME HARBOR_PASSWORD KUBECTX_PROD1 KUBECTX_STAGE1 WERF_SECRET_KEY KEYS_STR

          echo "$REPOS" | xargs -P 10 -I {} bash -c '
            REPO="{}"
            echo "→ $REPO"
            IFS="," read -ra KEYS <<< "$KEYS_STR"
            for KEY in "${KEYS[@]}"; do
              KEY=$(echo "$KEY" | tr -d " ")
              VALUE="${!KEY}"
              if [[ -n "$VALUE" ]]; then
                gh secret set "$KEY" --body "$VALUE" --repo "$REPO"
                echo "  ✓ $REPO $KEY"
              else
                echo "  ✗ $REPO $KEY — not found in env, skipping"
              fi
            done
          '
