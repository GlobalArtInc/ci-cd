# Sync secrets to all repositories in the current organization.
# Usage: run manually via workflow_dispatch.
#
# Required secret in this repo:
#   GH_TOKEN — personal access token with scopes: repo, admin:org
#
# Example:
#   KEYS: HARBOR_HOST,HARBOR_USERNAME,HARBOR_PASSWORD,KUBECTX_PROD1,KUBECTX_STAGE1,WERF_SECRET_KEY

on:
  workflow_dispatch:
    inputs:
      KEYS:
        required: true
        type: string
        default: "HARBOR_HOST,HARBOR_USERNAME,HARBOR_PASSWORD,KUBECTX_PROD1,KUBECTX_STAGE1,WERF_SECRET_KEY"
        description: "Comma-separated secret names to sync"

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Sync secrets to ${{ github.repository_owner }} repos
        env:
          HTTP_PROXY: ${{ secrets.HTTP_PROXY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          HARBOR_HOST: ${{ secrets.HARBOR_HOST }}
          HARBOR_USERNAME: ${{ secrets.HARBOR_USERNAME }}
          HARBOR_PASSWORD: ${{ secrets.HARBOR_PASSWORD }}
          KUBECTX_PROD1: ${{ secrets.KUBECTX_PROD1 }}
          KUBECTX_STAGE1: ${{ secrets.KUBECTX_STAGE1 }}
          WERF_SECRET_KEY: ${{ secrets.WERF_SECRET_KEY }}
          KEYS_STR: ${{ inputs.KEYS }}
        run: |
          if [[ -z "$GH_TOKEN" ]]; then
            echo "❌ GH_TOKEN is empty"
            exit 1
          fi

          export GH_TOKEN HARBOR_HOST HARBOR_USERNAME HARBOR_PASSWORD KUBECTX_PROD1 KUBECTX_STAGE1 WERF_SECRET_KEY KEYS_STR

          REPOS=$(gh repo list "${{ github.repository_owner }}" --limit 1000 --json nameWithOwner -q '.[].nameWithOwner')

          echo "$REPOS" | xargs -P 10 -I {} bash -c '
            export GH_TOKEN="'"$GH_TOKEN"'"
            REPO="{}"
            echo "→ $REPO"
            IFS="," read -ra KEYS <<< "'"$KEYS_STR"'"
            for KEY in "${KEYS[@]}"; do
              KEY=$(echo "$KEY" | tr -d " ")
              VALUE="${!KEY}"
              if [[ -n "$VALUE" ]]; then
                gh secret set "$KEY" --body "$VALUE" --repo "$REPO"
                echo "  ✓ $REPO $KEY"
              else
                echo "  ✗ $REPO $KEY — not found in env, skipping"
              fi
            done
          '
