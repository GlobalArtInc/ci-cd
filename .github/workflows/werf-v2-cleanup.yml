# Reusable workflow — equivalent of werf/v2/cleanup.gitlab-ci.yml
# Usage in a project repository:
#
#   jobs:
#     cleanup_prod:
#       needs: [deploy_prod]
#       uses: GlobalArtInc/ci-cd/.github/workflows/werf-v2-cleanup.yml@master
#       with:
#         deploy_env: prod
#       secrets: inherit  # not needed — credentials passed via inputs
#
#     cleanup_stage:
#       needs: [deploy_stage]
#       uses: GlobalArtInc/ci-cd/.github/workflows/werf-v2-cleanup.yml@master
#       with:
#         deploy_env: stage
#       secrets: inherit  # not needed — credentials passed via inputs

on:
  workflow_call:
    inputs:
      deploy_env:
        required: true
        type: string
        description: "Target environment: prod or stage"
      repo_name:
        required: false
        type: string
        description: "Repository name in Harbor (defaults to the GitHub repository name)"

      HARBOR_HOST:
        required: true
        type: string
        description: "Harbor registry host"
      HARBOR_USERNAME:
        required: true
        type: string
        description: "Harbor registry username"
      HARBOR_PASSWORD:
        required: true
        type: string
        description: "Harbor registry password"
      KUBECTX:
        required: true
        type: string
        description: "Base64-encoded kubeconfig (KUBECTX_PROD1 or KUBECTX_STAGE1)"

jobs:
  cleanup:
    runs-on: ubuntu-latest
    container:
      image: registry.werf.io/werf/werf:2-stable
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ inputs.KUBECTX }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Cleanup registry
        env:
          DEPLOY_ENV: ${{ inputs.deploy_env }}
          HARBOR_HOST: ${{ inputs.HARBOR_HOST }}
          HARBOR_USERNAME: ${{ inputs.HARBOR_USERNAME }}
          HARBOR_PASSWORD: ${{ inputs.HARBOR_PASSWORD }}
        run: |
          HARBOR_PROJECT="$DEPLOY_ENV"

          REPO_NAME="${{ inputs.repo_name }}"
          if [[ -z "$REPO_NAME" ]]; then REPO_NAME="${GITHUB_REPOSITORY##*/}"; fi

          if [[ -f ./.helm/def.sh ]]; then source ./.helm/def.sh && $DEPLOY_ENV; fi

          export WERF_REPO="$HARBOR_HOST/$HARBOR_PROJECT/$REPO_NAME"

          werf cr login -u "$HARBOR_USERNAME" -p "$HARBOR_PASSWORD" "$HARBOR_HOST"
          werf cleanup --repo "$WERF_REPO"
